<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Async Weather Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <header>
    <h1>⛅ Async Weather Tracker</h1>
    <p>Unit 2 · Async JS · Fetch API · Event Loop</p>
    <div class="header-line"></div>
  </header>

  <div class="grid">

    <!-- Search Panel -->
    <div class="panel">
      <div class="panel-label">// Search City</div>
      <div class="search-row">
        <input id="cityInput" type="text" placeholder="Delhi, London, Tokyo…" autocomplete="off"/>
        <button id="searchBtn" onclick="handleSearch()">SEARCH</button>
      </div>
      <div class="history-section">
        <div class="history-title">// Search History</div>
        <div id="historyTags"></div>
      </div>
    </div>

    <!-- Weather Info Panel -->
    <div class="panel">
      <div class="panel-label">// Weather Info</div>
      <div id="weatherBox">
        <div class="weather-empty">— Awaiting city input —</div>
      </div>
    </div>

    <!-- Console Panel -->
    <div class="panel console-panel">
      <div class="console-header">
        <div class="panel-label">// Console – Event Loop</div>
        <button class="clear-btn" onclick="clearConsole()">CLEAR</button>
      </div>
      <div id="consoleLog"></div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
